apiVersion: 1

contactPoints:
  - orgId: 1
    name: matrix-webhook
    receivers:
      - uid: matrix-webhook-01
        type: webhook
        settings:
          url: "http://localhost:9999/placeholder"
          httpMethod: POST
          title: "{{ .GroupLabels.alertname }}"
          message: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
        disableResolveMessage: false
