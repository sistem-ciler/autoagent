version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# SRV-HTZNR-EU-SWS  ·  single-host production stack  ·  rev.04  ·  2026-05-05
# Services:  autoagent · cua · trend-radar · synapse
# Infra:     postgres 16 · redis 7 · minio · caddy 2 · prometheus · grafana · loki
# Host:      Hetzner CCX52 · Debian 12 · Docker rootless · Falkenstein EU
# ─────────────────────────────────────────────────────────────────────────────

networks:
  internal:
    driver: bridge
    internal: true
  edge:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  synapse_data:
  prometheus_data:
  grafana_data:
  loki_data:
  caddy_data:
  caddy_config:

services:

  # ── Shared Infrastructure ─────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Application Services ───────────────────────────────────────────────

  autoagent:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/sistem-ciler/autoagent:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD}@postgres:5432/autoagent
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [internal]
    expose: ["8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  autoagent-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/sistem-ciler/autoagent:latest
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD}@postgres:5432/autoagent
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [internal]

  cua:
    image: ghcr.io/sistem-ciler/cua:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD}@postgres:5432/cua
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
    networks: [internal]
    expose: ["8443"]
    ports:
      - "5900-5910:5900-5910"
    devices:
      - /dev/kvm:/dev/kvm
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8443/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  trend-radar:
    image: ghcr.io/sistem-ciler/trend-radar:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ops}:${POSTGRES_PASSWORD}@postgres:5432/trend_radar
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres: {condition: service_healthy}
    networks: [internal, edge]
    expose: ["3000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  synapse:
    image: ghcr.io/sistem-ciler/synapse:latest
    restart: unless-stopped
    environment:
      SYNAPSE_CONFIG_PATH: /config/homeserver.yaml
    volumes:
      - synapse_data:/data
      - ./docker/synapse/homeserver.yaml:/config/homeserver.yaml:ro
    depends_on:
      postgres: {condition: service_healthy}
    networks: [internal, edge]
    expose: ["8008", "9093"]
    ports:
      - "8448:8448"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/_synapse/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Edge / Reverse Proxy ────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [autoagent, trend-radar, synapse]
    networks: [internal, edge]

  # ── Observability Stack ───────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [internal]
    expose: ["9090"]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus, loki]
    networks: [internal]
    expose: ["3000"]

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks: [internal]
    expose: ["3100"]

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    depends_on: [loki]
    networks: [internal]
    user: root
